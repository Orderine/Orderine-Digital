<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <title>Reserve & Delivery Order</title>
 <style>
  :root {
    --bg: #f4f8ff;
    --surface: #ffffff;
    --text: #1f2a44;
    --muted: #6b7a99;
    --border: #d8e1ff;
    --brand: #1f70ff;
    --brand-2: #2a5298;
    --brand-3: #1e3c72;
    --chip: #eef4ff;
    --danger: #e54646;
    --success: #25d366;
    --shadow: 0 6px 24px rgba(0,0,0,.08);
  }
  body.dark {
    --bg: #0e1116;
    --surface: #141922;
    --text: #e6ebff;
    --muted: #aab6db;
    --border: #263148;

    --chip: #0f1a2a;

.header {
  position: sticky;
  top: 0;
  z-index: 999;

  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 12px 20px;

}

  gap: 12px;

/* Supaya info benar-benar center */

}

.header-right {

@media (max-width: 480px) {

/* HEADER RIGHT FIX */
.header-right {

/* Dark mode tweak */

body.dark .filter-tabs button:hover {

/* === STYLE QTY MIRIP PSP === */
.qty-controls {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 4px;
  border-radius: 999px;

body.dark .qty-controls {

  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 8px rgba(0,0,0,0.35);
}

/* tombol - / + (tipis, pill look) */

  width: 25px;
  height: 25px;
  min-width: 25px;
  padding: 0;
  border: 0;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  font-weight: 700;
  color: var(--text);
  background: transparent;
  transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
  box-shadow: inset -1px -1px 0 rgba(255,255,255,0.35), inset 1px 1px 2px rgba(0,0,0,0.06);
}

}

body.dark .qty-controls button:hover {

}
.qty-controls span {

/* dark mode kotak qty */
body.dark .qty-controls span {

<script>

  let data = {};
  let pesanan = {};
  window.orderCategories = [];
  window.activeOrderCategory = null;

  (async () => {

  await new Promise(resolve => {
    const check = () => {
      if (window.MENUVA_DB) resolve();
      else setTimeout(check, 50);
    };
    check();
  });

  const session = await MENUVA_DB.getSession();
  if (!session?.restoID) {
    window.location.href = "menu.html";
    return;
  }

  const resto = await MENUVA_DB.get("restos", session.restoID);
  const enabled = resto?.settings?.orderPageEnabled ?? true;

  if (!enabled) {
    window.location.href = "menu.html";
    return;
  }

})();
  
/* ================= THEME (restore + toggle) ================= */

async function applyTheme() {
  const session = await MENUVA_DB.getSession();
  if (!session?.restoID) return;

  const resto = await MENUVA_DB.get("restos", session.restoID);
  const theme = resto?.settings?.theme || "light";

  // Apply ke body
  document.body.classList.toggle("dark", theme === "dark");

  // Update icon
  const btn = document.getElementById("darkToggle");
  if (btn) {
    btn.textContent = theme === "dark" ? "☀️" : "🌙";
  }
}

async function toggleDark() {
  const session = await MENUVA_DB.getSession();
  if (!session?.restoID) return;

  const resto = await MENUVA_DB.get("restos", session.restoID);
  if (!resto) return;

  const current = resto.settings?.theme === "dark";
  const newTheme = current ? "light" : "dark";

  // Update DOM dulu (biar responsif)
  document.body.classList.toggle("dark", newTheme === "dark");

  // Ensure settings object
  resto.settings = resto.settings || {};
  resto.settings.theme = newTheme;

  // Save ke DB
  await MENUVA_DB.update("restos", resto);

  // Update icon
  const btn = document.getElementById("darkToggle");
  if (btn) {
    btn.textContent = newTheme === "dark" ? "☀️" : "🌙";
  }

  console.log("🔥 THEME UPDATED TO:", newTheme);
}
  
function formatHarga(amount) {
  const ac = getActiveLocaleCurrency();
  const locale = ac.locale || undefined;
  const currency = ac.currency || 'IDR';
  const opts = {
    style: 'currency',
    currency,
    minimumFractionDigits: 0, // selalu tanpa desimal
    maximumFractionDigits: 0
  };
  try {
    return new Intl.NumberFormat(locale, opts).format(Number(amount || 0));
  } catch (e) {
    return (currency ? currency + ' ' : '') + (Number(amount) || 0).toLocaleString();
  }
}

  function getActiveLocaleCurrency() {
  return {
    locale: "id-ID",
    currency: "IDR"
  };
}
  
/* =================== SAFETY: escape HTML =================== */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

/* =================== HEADER / FILTER =================== */
function tampilkanHeader() {
  const logo = (data && data.logo) ? String(data.logo).trim() : '';
  const nama = data?.namaRestoran || '';
  const alamat = data?.restoAddress || '';
  const telp = data?.restoPhone || '';

  const logoEl = document.getElementById('restoLogo');
  if (logoEl) {
    if (logo) {
      logoEl.src = logo;
      logoEl.style.display = 'block';
      // in case image fails to load, hide it to avoid broken icon
      logoEl.onerror = () => { logoEl.style.display = 'none'; };
    } else {
      // hide if no logo provided by admin
      logoEl.style.display = 'none';
    }
  }

  const telpEl = document.getElementById('teleponRestoranDisplay');
  if (telpEl) telpEl.textContent = telp;
}

async function loadPromoMenus() {

  const session = await MENUVA_DB.getSession();
  const restoId = session?.restoID;
  if (!restoId) return;

  const allPromo = await MENUVA_DB.getAll("menuPromo");

  const filtered = allPromo.filter(p => 
    p.restoId === restoId && p.active !== false
  );

  const container = document.getElementById("promoContainer");
  if (!container) return;

  container.innerHTML = "";

  if (!filtered.length) {
    container.innerHTML = "<p style='opacity:0.6'>No promo available</p>";
    return;
  }

  filtered.forEach(promo => {

  const card = document.createElement("div");
  card.className = "promo-card";

  card.innerHTML = `
    ${promo.image ? `
      <div class="promo-img-wrap">
        <img src="${promo.image}">
      </div>
    ` : ""}

    <h3>${escapeHtml(promo.namaPromo)}</h3>

    <p class="promo-desc">
      ${escapeHtml(promo.deskripsi || "")}
    </p>

    <div class="promo-code">
      ${escapeHtml(promo.kodePromo || "")}
    </div>

    <p class="promo-price">
      ${formatHarga(promo.harga || 0)}
    </p>

    <div class="promo-countdown" id="countdown-${promo.id}"></div>

    <button onclick="addPromoToCart('${promo.id}')">
      Order Now
    </button>
  `;

  container.appendChild(card);

  if (promo.expiredAt) {
    startCountdown(promo.id, promo.expiredAt);
  }

});
}

  function startCountdown(id, endTime) {

  const el = document.getElementById(`countdown-${id}`);
  if (!el) return;

  function update() {

    const now = new Date().getTime();
    const target = new Date(endTime).getTime();
    const diff = target - now;

    if (diff <= 0) {
      el.innerText = "EXPIRED";
      return;
    }

    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    el.innerText = `Ends in ${h}h ${m}m ${s}s`;
  }

  update();
  setInterval(update, 1000);
}

  function addPromoToCart(promoId) {

  if (!pesanan[promoId]) {
    pesanan[promoId] = 1;
  } else {
    pesanan[promoId]++;
  }

  updateRingkasan();
}

async function loadOrderMenus() {

  const session = await MENUVA_DB.getSession();
  const restoId = session?.restoID;

  if (!restoId) return;

  const allMenus = await MENUVA_DB.getAll("menuData");

  const filtered = allMenus.filter(m => m.restoId === restoId);

  const unique = {};

  filtered.forEach(m => {

  if (typeof m.category === "string") {
    unique[m.category] = { name: m.category };
  }

  if (typeof m.category === "object" && m.category?.name) {
    unique[m.category.name] = m.category;
  }

});

  window.orderCategories = Object.values(unique);

  if (!window.activeOrderCategory && window.orderCategories.length) {
    window.activeOrderCategory = window.orderCategories[0].name;
  }

  renderOrderCategoryFilter();
}

  function renderOrderCategoryFilter() {

  const container = document.getElementById("kategoriTabs");
  if (!container) return;

  container.innerHTML = "";

  window.orderCategories.forEach(cat => {

    const btn = document.createElement("button");
    btn.className = "order-filter-btn";
    btn.textContent = cat.name;

    if (cat.name === window.activeOrderCategory) {
      btn.classList.add("active");
    }

    btn.onclick = async () => {
      window.activeOrderCategory = cat.name;
      renderOrderCategoryFilter();
      await renderOrderMenuGrid(cat.name);
    };

    container.appendChild(btn);
  });

  if (window.activeOrderCategory) {
    renderOrderMenuGrid(window.activeOrderCategory);
  }
}

 async function renderOrderMenuGrid(categoryName) {

  const restoId = session?.restoID;
  if (!restoId) return;

  const allMenus = await MENUVA_DB.getAll("menuData");

  const filtered = allMenus.filter(m => {

  if (m.restoId !== restoId) return false;

  if (typeof m.category === "string") {
    return m.category === categoryName;
  }

  if (typeof m.category === "object") {
    return m.category?.name === categoryName;
  }

});

  const grid = document.getElementById("menu-list");

  grid.innerHTML = "";

}

/* =================== RINGKASAN =================== */
async function updateRingkasan() {

  const session = await MENUVA_DB.getSession();
  const restoId = session?.restoID;
  if (!restoId) return;

  const allMenus = await MENUVA_DB.getAll("menuData");
const allPromo = await MENUVA_DB.getAll("menuPromo");

const restoMenus = allMenus.filter(m => m.restoId === restoId);
const restoPromos = allPromo.filter(p => p.restoId === restoId);

const combinedItems = [...restoMenus, ...restoPromos];

  let totalHargaValue = 0;
  const cartEl = document.getElementById("cartItems");
  if (cartEl) cartEl.innerHTML = "";

  Object.entries(pesanan).forEach(([menuId, jumlah]) => {

    if (!jumlah || jumlah <= 0) return;

    const item = combinedItems.find(m => m.id === menuId);
    if (!item) return;

   const harga = Number(item.price ?? item.harga) || 0;
   const nama = item.name ?? item.namaPromo ?? "";

    totalHargaValue += jumlah * harga;

    if (cartEl) {
      const row = document.createElement("div");
      row.className = "cart-row";
      row.innerHTML = `
        <span class="cart-name">${escapeHtml(nama)}</span>
        <span class="cart-qty">x${jumlah}</span>
        <span class="cart-price">${formatHarga(harga * jumlah)}</span>
      `;
      cartEl.appendChild(row);
    }

  });

  const totalEl = document.getElementById("totalPrice");
  const grandEl = document.getElementById("grandTotal");

  if (totalEl) {
    totalEl.innerText = `Total Price = ${formatHarga(totalHargaValue)}`;
    totalEl.dataset.raw = String(totalHargaValue);
    totalEl.dataset.rawOriginal = String(totalHargaValue);
  }

  if (grandEl) {
    grandEl.innerText = `Grand Total = ${formatHarga(totalHargaValue)}`;
  }

  autoApplyVoucher();
}

  function addToCart(menuId) {

  if (!pesanan[menuId]) {
    pesanan[menuId] = 1;
  } else {
    pesanan[menuId]++;
  }

  updateRingkasan();
}

/* =================== KIRIM PESAN (WhatsApp) =================== */
function kirimPesanan() {

  const namaCust   = document.getElementById('nama')?.value.trim() || '';
  const alamatCust = document.getElementById('alamat')?.value.trim() || '';
  const waktuAntar = document.getElementById('waktuAntar')?.value;
  const catatan    = document.getElementById('catatan')?.value.trim() || '';
  const ruangan    = document.getElementById('ruangan')?.value.trim() || '';

  if (!data || (!Array.isArray(data.menu) && !Array.isArray(data.menuPromo))) {
    alert('❌ Restaurant data not found.');
    return;
  }

  const lines = [];

  Object.entries(pesanan).forEach(([key, jumlah]) => {
    if (!jumlah || jumlah <= 0) return;

    let item, harga, nama, kode = "";

    if (String(key).startsWith("promo-")) {
      const idx = parseInt(String(key).split("-")[1], 10);
      item = (data.menuPromo || [])[idx];
      if (!item) return;

      harga = Number(item.harga) || 0;
      nama  = item.namaPromo || item.namaMenu || "Promo";
      kode  = item.productCode ? `[${item.productCode}] ` : "";

    } else {
      const idx = Number(key);
      item = (data.menu || [])[idx];
      if (!item) return;

      harga = Number(item.harga) || 0;
      nama  = item.nama || "Item";
      kode  = item.productCode ? `[${item.productCode}] ` : "";
    }

    lines.push(
      `${kode}${nama} x${jumlah} = ${formatHarga(harga * jumlah)}`
    );
  });

  if (lines.length === 0) {
    alert('⚠️ No items selected.');
    return;
  }

  /* =================== AMBIL TOTAL DARI SUMMARY =================== */

  const totalEl  = document.getElementById("totalPrice");
  const grandEl  = document.getElementById("grandTotal");
  const diskonEl = document.getElementById("voucherDiscount");

  const subtotalRaw = Number(totalEl?.dataset.raw || 0);
  const subtotalText = formatHarga(subtotalRaw);

  const diskonText = diskonEl?.innerText || "";
  const grandText  = grandEl?.innerText || "";

  /* =================== FORMAT PESAN =================== */

  const now = new Date();
  const waktuOrder = now.toLocaleString("id-ID");

  let pesan = `🧾 *NEW ORDER*\n`;
  pesan += `━━━━━━━━━━━━━━━━━━\n\n`;

  pesan += `👤 Customer : ${namaCust || 'Customer'}\n`;
  pesan += `📅 Order Date : ${waktuOrder}\n`;

  if (waktuAntar) {
    pesan += `🕒 Delivery Time : ${new Date(waktuAntar).toLocaleString("id-ID")}\n`;
  }

  if (ruangan) {
    pesan += `🏨 Room : ${ruangan}\n`;
  }

  if (alamatCust) {
    pesan += `\n📍 Address:\n${alamatCust}\n`;
  }

  pesan += `\n🛒 *ORDER LIST*\n`;
  pesan += `━━━━━━━━━━━━━━━━━━\n`;
  pesan += `${lines.join('\n')}\n`;
  pesan += `━━━━━━━━━━━━━━━━━━\n\n`;

  pesan += `💰 Subtotal : ${subtotalText}\n`;

  if (diskonText) {
    pesan += `${diskonText}\n`;
  }

  if (grandText) {
    pesan += `${grandText}\n`;
  }

  if (catatan) {
    pesan += `\n📌 Notes:\n${catatan}\n`;
  }

  pesan += `\n━━━━━━━━━━━━━━━━━━`;

  /* =================== KIRIM KE ADMIN =================== */

  const nomorAdminList = data.nomorWaAdmin || [];

  if (!Array.isArray(nomorAdminList) || nomorAdminList.length === 0) {
    alert('⚠️ Tidak ada nomor admin yang tersedia.');
    return;
  }

  nomorAdminList.forEach(nomor => {
    const cleaned = String(nomor).replace(/[^0-9]/g, '');
    if (!cleaned) return;

    const waLink = `https://wa.me/${cleaned}?text=${encodeURIComponent(pesan)}`;
    window.open(waLink, '_blank');
  });
}

<script>
window.addEventListener("load", async () => {

  const session = await MENUVA_DB.getSession();
  if (!session?.restoID) return;

  const resto = await MENUVA_DB.get("restos", session.restoID);
  if (!resto) return;

  const plan = resto?.subscription?.plan || "free";
  const voucherEnabled = resto?.settings?.voucherPageEnabled ?? false;

  if (plan !== "monthly" && voucherEnabled) {
    const el = document.getElementById("voucherSection");
    if (el) el.style.display = "block";
  }

});

  
  // Helper parse angka
function cleanNumber(val) {
  if (val == null) return 0;
  return parseFloat(String(val).replace(/[^0-9.-]/g, "")) || 0;
}

// === Apply Voucher otomatis ===
async function autoApplyVoucher() {
  const inputEl = document.getElementById("voucherInput");
  const input = inputEl?.value.trim();
  const msg = document.getElementById("voucherMessage");

  const totalEl = document.getElementById("totalPrice");
  const discountEl = document.getElementById("voucherDiscount");
  const grandEl = document.getElementById("grandTotal");

  if (!totalEl || !msg || !grandEl) return;

  // Simpan total asli hanya sekali
  if (!totalEl.dataset.rawOriginal) {
    totalEl.dataset.rawOriginal = String(cleanNumber(totalEl.dataset.raw) || 0);
  }

  const originalTotal = cleanNumber(totalEl.dataset.rawOriginal);

  // Reset saat input kosong
  if (!input) {
    inputEl.classList.remove("voucher-ok", "voucher-error");

    totalEl.innerText = `Total Price = ${formatHarga(originalTotal)}`;
    totalEl.dataset.raw = String(originalTotal);

    msg.innerText = "";
    if (discountEl) discountEl.style.display = "none";

    grandEl.innerText = `Grand Total = ${formatHarga(originalTotal)}`;
    return;
  }

  // Ambil voucher aktif
  const vouchers = await loadVoucherList();
  const codeUpper = input.toUpperCase();
  const found = vouchers.find(v => v.code === codeUpper);

  if (!found) {
    // === Voucher INVALID ===
    inputEl.classList.remove("voucher-ok");
    inputEl.classList.add("voucher-error");

    msg.innerText = "❌ Voucher Code is invalid or expired";
    msg.style.color = "red";

    totalEl.innerText = `Total Price = ${formatHarga(originalTotal)}`;
    totalEl.dataset.raw = String(originalTotal);

    if (discountEl) discountEl.style.display = "none";

    grandEl.innerText = `Grand Total = ${formatHarga(originalTotal)}`;
    return;
  }

  // === Voucher VALID ===
  inputEl.classList.remove("voucher-error");
  inputEl.classList.add("voucher-ok");

  const discountPercent = parseFloat(found.discount) || 0;
  const potongan = originalTotal * (discountPercent / 100);
  const discounted = originalTotal - potongan;

  msg.innerText = `✅ Voucher valid! Diskon ${discountPercent}% diterapkan`;
  msg.style.color = "green";

  totalEl.innerText = `Total Price = ${formatHarga(originalTotal)}`;
  totalEl.dataset.raw = String(discounted);

  if (discountEl) {
    discountEl.style.display = "block";
    discountEl.innerText = `Discount ${discountPercent}% = ${formatHarga(potongan)}`;
  }

  grandEl.innerText = `Grand Total = ${formatHarga(discounted)}`;
}
