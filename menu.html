<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>All Menu</title>
<style>
  * {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden; /* 🔥 matikan geser kanan kiri */
}
  
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b0f14;
    color: #d4d4d4;
    padding-bottom: 100px; 
  }

  /* ================== Header Restoran ================== */
  .header-resto {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #fff;
    text-align: center;
    padding: 16px 8px;
  }
  .header-resto img {
    max-height: 60px;
    display: block;
    margin: 0 auto 10px;
  }
  .header-resto h1 {
    margin: 0 0 5px 0;
    font-size: 16px;
  }
  #infoResto {
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 8px;
    display: inline-block;
  }
  #infoResto p {
    margin: 4px 0;
  }

  /* ================== Container Section ================== */
.container-section {
  max-width: 820px;   /* 🔥 lebih kecil dari 900px */
  width: 95%;         /* responsive */
  margin: 40px auto;  /* lebih lega atas bawah */
  padding: 24px;
  background: #11161c;
  border: 1px solid #1f2a36;
  border-radius: 14px;
  box-shadow: 0 0 25px rgba(0,255,136,0.05);
}
  /* ================== Section Titles ================== */
.section-title {
  color: #00ff88;
  font-family: monospace;
  border-bottom: 1px solid #00ff88;
  text-align: center;
}

  /* ================== Promo Grid ================== */
 .promo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

.promo-item {
  background: #0f141a;
  border: 1px solid #1c2a35;
  border-radius: 12px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
  min-height: 360px; /* 🔥 FIXED HEIGHT */
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

.promo-badge {
  position: absolute;
  top: 12px;
  left: 12px;

  display: inline-block; /* 🔥 penting */
  width: auto;
  max-width: 80%;

  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;

  background: linear-gradient(145deg, #00ff88, #00cc6a);
  color: #000;

  border-radius: 999px;

  box-shadow: 
    0 0 6px rgba(0,255,136,0.6),
    inset 0 1px 2px rgba(255,255,255,0.4); /* 🔥 glossy effect */
}
  
.promo-item img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 12px;
}

  .promo-item h3 { margin: 0 0 6px 0; font-size: 16px; }
  .promo-item p { margin: 0 0 10px 0; font-size: 14px; color: #555; }
  .promo-price { font-weight: bold; color: #28a745; margin-bottom: 8px; }

  .warning { text-align: center; color: #e74c3c; margin: 10px 0; }

  /* ================== Flipbook Gallery ================== */
  .flipbook-gallery {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 10px;
    padding: 10px 0;
    max-width: 100%;
  }
  .flipbook-gallery img {
    flex-shrink: 0;
    width: 100%;  /* 1 gambar full container */
    max-width: 100%;
    height: auto;
    scroll-snap-align: center;
    border-radius: 10px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid #ccc;
    transition: transform 0.3s ease, border-color 0.3s ease;
  }
  .flipbook-gallery img:hover {
    border-color: #28a745;
    box-shadow: 0 0 6px rgba(40,167,69,0.5);
    transform: scale(1.02);
  }

  /* ================== Fullscreen Overlay ================== */
  .fullscreen-overlay {
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .fullscreen-overlay img {
    max-width: 95vw;
    max-height: 90vh;
    border-radius: 10px;
  }
  .fullscreen-overlay .close-btn {
    position: absolute; top: 20px; right: 30px;
    font-size: 30px; color:#fff; cursor:pointer;
  }
  .fullscreen-overlay .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 40px; color: #fff; cursor:pointer;
    padding: 10px; background: rgba(0,0,0,0.4); border-radius: 50%;
  }
  .fullscreen-overlay .prev-btn { left: 20px; }
  .fullscreen-overlay .next-btn { right: 20px; }

  /* ================== Buttons ================== */
  .btn-book { display:block; margin:20px auto; width:80%; padding:16px; font-size:1.2rem; background:#ffc107; color:#fff; border:none; border-radius:12px; cursor:pointer; transition:0.3s; }
  .btn-book:hover { background:#e0a800; }

  .fixed-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  border-top: 1px solid #ddd;
  padding: 6px 0;
  z-index: 1000;
}

.nav-btn {
  display: flex;
  flex-direction: column; /* icon di atas, teks di bawah */
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  outline: none;
  flex: 1;
  cursor: pointer;
  padding: 4px 0;
  font-family: inherit;
  color: #fff; /* 👈 warna teks & icon jadi putih */
  transition: color 0.2s ease;
}

.nav-btn:hover {
   color: #facc15;
}

.nav-btn .icon {
  font-size: 22px; /* ukuran icon */
  line-height: 1.2;
}

.nav-btn .label {
  font-size: 12px; /* ukuran teks kecil */
  margin-top: 2px;
}

 .promo-countdown {
  color: #ff3b3b;
  font-family: monospace;
}
@keyframes pulseAlert {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

.pulse {
  animation: pulseAlert 1s infinite;
  color: #ff3b3b !important;
  font-weight: bold;
}
.promo-item {
  transition: box-shadow 0.3s ease;
}

.promo-item:hover {
  border-color: #00ff88;
  box-shadow: 0 0 18px rgba(0,255,136,0.25);
  transform: translateY(-3px);
  transition: 0.3s ease;
}
.promo-item h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 6px 0;
  color: #e6edf3;
}

.promo-item p {
  font-size: 13px;
  color: #9aa4af;
  flex-grow: 1; /* 🔥 agar deskripsi isi space */
}

.promo-price {
  font-size: 15px;
  font-weight: 700;
  color: #00ff88;
  font-family: monospace;
}
.promo-item {
  text-align: center;   /* 🔥 semua text rata tengah */
}

.promo-item h3,
.promo-item p,
.promo-price,
.promo-countdown {
  text-align: center;
}

 .reservation-modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.6);

display:none;

align-items:center;
justify-content:center;

}

.reservation-box{

background:white;

padding:20px;

border-radius:10px;

width:320px;

display:flex;

gap:10px;

}

 .reservation-box{

background:#0b0f14;
color:#00ff9c;

border:1px solid #00ff9c;

border-radius:6px;

width:340px;

display:flex;
flex-direction:column;

.reservation-box input,

.res-actions{

}

.slot-grid{

}

.slot{

.slot.available{

.slot.selected{

}
</style>

<script src="./db-core.js"></script>
<script>
/* =======================
   RESTO ID
======================= */
async function getRestoId() {
  const params = new URLSearchParams(location.search);
  const resto = params.get("resto");

  if (resto) {
    await MENUVA_DB.add("session", {
      id: "activeResto",
      value: resto
    });
    return resto;
  }

  const stored = await MENUVA_DB.get("session", "activeResto");
  return stored?.value || null;
}


/* =======================
   LOAD MENU PAGE DATA (FINAL)
   ⛔ TANPA flipbookData
======================= */
async function loadMenuPageData(restoId) {
  const resto = await MENUVA_DB.get("restos", restoId);
  if (!resto) return null;

  // 🔥 Ambil promo dari store menuPromo
  const allPromos = await MENUVA_DB.getAll("menuPromo");

  const filteredPromos = allPromos.filter(
    p => p.restoId === restoId
  );

  return {
    resto,
    promo: filteredPromos,

    flipbookRuangan: Array.isArray(resto.flipbookRuanganImages)
      ? resto.flipbookRuanganImages
      : [],

    flipbookMenu: Array.isArray(resto.flipbookMenuImages)
      ? resto.flipbookMenuImages
      : []
  };
}
/* =======================
   RENDER
======================= */
function renderHeader(data) {
  const logo = document.getElementById("logoResto");
  if (logo) {
    logo.style.display = data.logo ? "block" : "none";
    if (data.logo) logo.src = data.logo;
  }

  document.getElementById("namaRestoDisplay").textContent =
    data.namaRestoran || "Menu Restoran";

  document.getElementById("alamatResto").innerText =
    `📍 Address: ${data.restoAddress || "-"}`;

  document.getElementById("teleponResto").innerText =
    `📞 Telephone: ${data.restoPhone || "-"}`;
}

  function normalizePromo(raw) {
  return {
    id: raw.id || crypto.randomUUID(),

    namaPromo: raw.namaPromo || raw.name || "Untitled",

    deskripsi: raw.deskripsi || raw.description || "",

    harga: raw.harga ?? raw.price ?? 0,

    kategori: raw.kategori || raw.type || "PROMO",

    tanggalAkhir: raw.tanggalAkhir || raw.endDate || null,

    image: raw.image || raw.imageUrl || null,

    isActive:
      raw.isActive ??
      raw.aktif ??
      raw.enabled ??
      (raw.status === "active")
  };
}
  
function renderPromo(list = []) {
  const box = document.getElementById("promoContainer");
  const warn = document.getElementById("promoWarning");

  box.innerHTML = "";
  warn.textContent = "";

  if (!list.length) {
    warn.textContent = "❌ No promo available";
    return;
  }

  let visibleCount = 0; // 🔥 counter promo yang benar-benar tampil

  list.forEach(raw => {
    const p = normalizePromo(raw);

    if (!p.isActive) return;

    if (p.tanggalAkhir) {
      const end = new Date(p.tanggalAkhir);
      end.setHours(23,59,59,999);
      if (end < new Date()) return;
    }

    visibleCount++;

    const card = document.createElement("div");
    card.className = "promo-item";

    if (p.kategori) {
      const badge = document.createElement("div");
      badge.className = "promo-badge";
      badge.textContent = p.kategori;
      card.appendChild(badge);
    }

    if (p.image) {
      const img = document.createElement("img");
      img.src = p.image;
      card.appendChild(img);
    }

    const countdownId = `cd-${p.id}`;

    card.innerHTML += `
      <h3>${p.namaPromo}</h3>
      <p>${p.deskripsi}</p>
      <div class="promo-price">
        Rp ${Number(p.harga).toLocaleString("id-ID")}
      </div>
      <div class="promo-countdown" id="${countdownId}"></div>
    `;

    box.appendChild(card);

    startPromoCountdown(p);
  });

  if (visibleCount === 0) {
    warn.textContent = "❌ No active promo available";
  }
}

  function renderMenuPromoUI(promos = []) {
  const container = document.getElementById("menuPromoContainer");
  if (!container) return;

  container.innerHTML = "";

  promos.forEach(promo => {
    renderMenuPromo(promo);
  });
}

 function startPromoCountdown(promo) {
  const el = document.getElementById(`cd-${promo.id}`);
  if (!el || !promo.tanggalAkhir) return;

  const end = new Date(promo.tanggalAkhir);
  end.setHours(23, 59, 59, 999);

  function update() {
    const now = new Date();
    const diff = end - now;

    if (diff <= 0) {
  el.textContent = "❌ PROMO EXPIRED";

  const card = el.closest(".promo-item");
  if (card) {
    setTimeout(() => {
      card.remove();
    }, 2000);
  }

  return;
}

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / (3600 * 24));
    const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    el.textContent =
      `⏳ ${days}d ${hours}h ${minutes}m ${seconds}s`;

    // 🔥 Bloomberg danger mode
    if (days === 0 && hours < 24) {
      el.classList.add("pulse");
    } else {
      el.classList.remove("pulse");
    }
  }

  update();
  setInterval(update, 1000);
}

/* =======================
   FLIPBOOK (FINAL)
======================= */
function renderFlipbookGallery(id, images = [], warnId) {
  const box = document.getElementById(id);
  const warn = document.getElementById(warnId);
  if (!box || !warn) return;

  box.innerHTML = "";
  warn.textContent = "";

  const validImages = Array.isArray(images)
    ? images.filter(src => typeof src === "string" && src.trim() !== "")
    : [];

  if (!validImages.length) {
    warn.textContent = "No pictures.";
    return;
  }

  validImages.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.loading = "lazy";
    box.appendChild(img);
  });
}

/* =======================
   INIT MENU (SIMPLE)
======================= */
async function initMenuPage() {
  console.log("▶️ initMenuPage");

  const restoId = await getRestoId();
  if (!restoId) {
    console.warn("❌ Resto ID tidak ditemukan");
    return;
  }

  const data = await loadMenuPageData(restoId);
  if (!data) {
    showFallbackUI("Menu belum tersedia");
    return;
  }

  renderHeader(data.resto);

  // 🔥 INI YANG BENAR
  renderPromo(data.promo);

  renderFlipbookGallery(
    "flipbookRuanganGallery",
    data.flipbookRuangan,
    "ruanganWarning"
  );

  renderFlipbookGallery(
    "flipbookMenuGallery",
    data.flipbookMenu,
    "menuWarning"
  );

  console.log("✅ Menu ready");
}

 /* =======================
   reservation modal
======================= */

 function openReservationPanel(){

document.getElementById("reservationPanel")
.style.display = "flex";

loadReservationSlots();

}

function closeReservationPanel(){

document.getElementById("reservationPanel")
.style.display = "none";

}

let selectedSlot = null;

const RES_DURATION = 90; // menit

function loadSlots(){

const date =
document.getElementById("resDate").value;

const guests =
parseInt(
document.getElementById("resGuests").value
);

const slots =
generateTimeSlots("17:00","22:00",30);

const container =
document.getElementById("slotContainer");

container.innerHTML="";

slots.forEach(slot=>{

const status =
getSlotStatus({

slot:slot,
duration:RES_DURATION,
guests:guests,
tables:tables,
reservations:reservations

});

const btn =
document.createElement("button");

btn.innerText = slot;

btn.className="slot-btn";

if(status === "AVAILABLE"){

btn.classList.add("slot-available");

btn.onclick=()=>selectSlot(slot);

}

if(status === "LIMITED"){

btn.classList.add("slot-limited");

btn.onclick=()=>selectSlot(slot);

}

if(status === "FULL"){

btn.classList.add("slot-full");

btn.disabled=true;

}

container.appendChild(btn);

});

}

 function selectSlot(slot){

selectedSlot = slot;

document
.querySelectorAll(".slot-btn")
.forEach(b=>{

if(b.innerText === slot){

b.classList.add("slot-selected");

}else{

b.classList.remove("slot-selected");

}

});

}

 document
.getElementById("resGuests")
.addEventListener("change",loadSlots);

 function submitReservation(){

const date =
document.getElementById("resDate").value;

const guests =
parseInt(
document.getElementById("resGuests").value
);

const name =
document.getElementById("resName").value;

const phone =
document.getElementById("resPhone").value;

if(!selectedSlot){

alert("Select time slot");

return;

}

const result =
createReservation({

date:date,

startTime:selectedSlot,

duration:RES_DURATION,

guests:guests,

name:name,

phone:phone,

tables:tables,

reservations:reservations

});

if(!result.success){

alert("No table available");

return;

}

reservations.push(
result.reservation
);

alert("Reservation Confirmed");

closeReservation();

loadSlots();

}

 /* ===============================
   LIVE SLOT REFRESH
=============================== */

setInterval(()=>{

const modal =
document.getElementById("reservationModal");

if(modal.style.display === "flex"){

loadSlots();

}

},5000);
  
/* =======================
   START
======================= */
document.addEventListener("DOMContentLoaded", async () => {
  await window.MENUVA_DB.openDB(); // ✅ sesuai kontrak
  initMenuPage();
});

/* =======================
   UTIL
======================= */
function showFallbackUI(msg) {
  document.querySelector(".container-section").innerHTML =
    `<div style="text-align:center;padding:40px">${msg}</div>`;
}

async function goToPage(page) {
  const stored = await MENUVA_DB.get("session", "activeResto");
  const id = stored?.value;

  location.href = id ? `${page}?resto=${id}` : page;
}

</script>

 <script src="reservation-engine.js"></script>
