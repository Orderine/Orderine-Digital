<style>
  * {
  box-sizing: border-box;
}

html, body {
  margin: 0;

}

  /* ================== Container Section ================== */
.container-section {

.section-title {

  border-bottom: 1px solid #00ff88;

}

  /* ================== Promo Grid ================== */
 .promo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

.promo-item {
  background: #0f141a;
  border: 1px solid #1c2a35;
  border-radius: 12px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
  min-height: 360px; /* 🔥 FIXED HEIGHT */
  box-sizing: border-box;
  position: relative;
  overflow: hidden;
}

.promo-badge {
  position: absolute;
  top: 12px;
  left: 12px;

  display: inline-block; /* 🔥 penting */
  width: auto;
  max-width: 80%;

  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;

  background: linear-gradient(145deg, #00ff88, #00cc6a);
  color: #000;

  border-radius: 999px;

  box-shadow: 
    0 0 6px rgba(0,255,136,0.6),
    inset 0 1px 2px rgba(255,255,255,0.4); /* 🔥 glossy effect */
}
  
.promo-item img {
  width: 100%;
  height: 170px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 12px;
}

  .promo-item h3 { margin: 0 0 6px 0; font-size: 16px; }
  .promo-item p { margin: 0 0 10px 0; font-size: 14px; color: #555; }
  .promo-price { font-weight: bold; color: #28a745; margin-bottom: 8px; }

  .warning { text-align: center; color: #e74c3c; margin: 10px 0; }

  /* ================== Flipbook Gallery ================== */
  .flipbook-gallery {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 10px;
    padding: 10px 0;
    max-width: 100%;
  }
  .flipbook-gallery img {
    flex-shrink: 0;
    width: 100%;  /* 1 gambar full container */
    max-width: 100%;
    height: auto;
    scroll-snap-align: center;
    border-radius: 10px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid #ccc;
    transition: transform 0.3s ease, border-color 0.3s ease;
  }
  .flipbook-gallery img:hover {
    border-color: #28a745;
    box-shadow: 0 0 6px rgba(40,167,69,0.5);
    transform: scale(1.02);
  }

  /* ================== Fullscreen Overlay ================== */
  .fullscreen-overlay {
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .fullscreen-overlay img {
    max-width: 95vw;
    max-height: 90vh;
    border-radius: 10px;
  }
  .fullscreen-overlay .close-btn {
    position: absolute; top: 20px; right: 30px;
    font-size: 30px; color:#fff; cursor:pointer;
  }
  .fullscreen-overlay .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 40px; color: #fff; cursor:pointer;
    padding: 10px; background: rgba(0,0,0,0.4); border-radius: 50%;
  }
  .fullscreen-overlay .prev-btn { left: 20px; }
  .fullscreen-overlay .next-btn { right: 20px; }

  /* ================== Buttons ================== */
  .btn-book { display:block; margin:20px auto; width:80%; padding:16px; font-size:1.2rem; background:#ffc107; color:#fff; border:none; border-radius:12px; cursor:pointer; transition:0.3s; }
  .btn-book:hover { background:#e0a800; }

  .fixed-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  border-top: 1px solid #ddd;
  padding: 6px 0;
  z-index: 1000;
}

.nav-btn {
  display: flex;
  flex-direction: column; /* icon di atas, teks di bawah */
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  outline: none;
  flex: 1;
  cursor: pointer;
  padding: 4px 0;

  color: #fff; /* 👈 warna teks & icon jadi putih */

}

.nav-btn:hover {
   color: #facc15;

.nav-btn .icon {

.nav-btn .label {

 .promo-countdown {

  50% { opacity: 0.4; transform: scale(1.05); }

.pulse {

<script>

let tables = [];
let reservations = [];

let selectedSlot = null;
let selectedTables = [];
let selectedTable = null;

/* =======================
   RESTO ID
======================= */
async function getRestoId(){

const params = new URLSearchParams(location.search);
const resto = params.get("resto");

if(resto){

await MENUVA_DB.add("session",{
id:"activeResto",
value:resto
});

return resto;

}

const stored =
await MENUVA_DB.get("session","activeResto");

return stored?.value || null;

}

/* =======================
   LOAD MENU PAGE DATA
======================= */

async function loadMenuPageData(restoId){

const resto =
await MENUVA_DB.get("restos",restoId);

if(!resto) return null;

const allPromos =
await MENUVA_DB.getAll("menuPromo");

const filteredPromos =
allPromos.filter(p=>p.restoId===restoId);

return {

resto,
promo:filteredPromos,

flipbookRuangan:
Array.isArray(resto.flipbookRuanganImages)
? resto.flipbookRuanganImages
:[],

flipbookMenu:
Array.isArray(resto.flipbookMenuImages)
? resto.flipbookMenuImages
:[]

};

}

/* =======================
   RENDER HEADER
======================= */

function renderHeader(data){

const logo =
document.getElementById("logoResto");

if(logo){

logo.style.display =
data.logo ? "block":"none";

if(data.logo) logo.src=data.logo;

}

document.getElementById("namaRestoDisplay")
.textContent =
data.namaRestoran || "Menu Restoran";

document.getElementById("alamatResto")
.innerText =
`📍 Address: ${data.restoAddress||"-"}`;

document.getElementById("teleponResto")
.innerText =
`📞 Telephone: ${data.restoPhone||"-"}`;

}

/* =======================
   PROMO
======================= */

function normalizePromo(raw){

return{

id:raw.id || crypto.randomUUID(),

namaPromo:
raw.namaPromo || raw.name || "Untitled",

deskripsi:
raw.deskripsi || raw.description || "",

harga:
raw.harga ?? raw.price ?? 0,

kategori:
raw.kategori || raw.type || "PROMO",

tanggalAkhir:
raw.tanggalAkhir || raw.endDate || null,

image:
raw.image || raw.imageUrl || null,

isActive:
raw.isActive ??
raw.aktif ??
raw.enabled ??
(raw.status==="active")

};

}

function renderPromo(list=[]){

const box =
document.getElementById("promoContainer");

const warn =
document.getElementById("promoWarning");

if(!box) return;

box.innerHTML="";
warn.textContent="";

if(!list.length){

warn.textContent="❌ No promo available";
return;

}

let visible=0;

list.forEach(raw=>{

const p=normalizePromo(raw);

if(!p.isActive) return;

if(p.tanggalAkhir){

const end=new Date(p.tanggalAkhir);
end.setHours(23,59,59,999);

if(end < new Date()) return;

}

visible++;

const card=document.createElement("div");
card.className="promo-item";

if(p.image){

const img=document.createElement("img");
img.src=p.image;
card.appendChild(img);

}

const countdownId=`cd-${p.id}`;

card.innerHTML+=`

<h3>${p.namaPromo}</h3>
<p>${p.deskripsi}</p>
<div class="promo-price">
Rp ${Number(p.harga).toLocaleString("id-ID")}
</div>
<div class="promo-countdown" id="${countdownId}"></div>

`;

box.appendChild(card);

startPromoCountdown(p);

});

if(visible===0)
warn.textContent="❌ No active promo";

}

/* =======================
   PROMO COUNTDOWN
======================= */

function startPromoCountdown(promo){

const el =
document.getElementById(`cd-${promo.id}`);

if(!el || !promo.tanggalAkhir) return;

const end=new Date(promo.tanggalAkhir);
end.setHours(23,59,59,999);

function update(){

const diff=end-new Date();

if(diff<=0){

el.textContent="❌ PROMO EXPIRED";

const card=el.closest(".promo-item");

if(card){
setTimeout(()=>card.remove(),2000);
}

return;

}

const s=Math.floor(diff/1000);

const d=Math.floor(s/86400);
const h=Math.floor((s%86400)/3600);
const m=Math.floor((s%3600)/60);
const sec=s%60;

el.textContent=
`⏳ ${d}d ${h}h ${m}m ${sec}s`;

}

update();
setInterval(update,1000);

}

/* =======================
   FLIPBOOK
======================= */

function renderFlipbookGallery(id,images=[],warnId){

const box=document.getElementById(id);
const warn=document.getElementById(warnId);

if(!box||!warn) return;

box.innerHTML="";
warn.textContent="";

const valid=images.filter(
src=>typeof src==="string" && src.trim()
);

if(!valid.length){

warn.textContent="No pictures.";
return;

}

valid.forEach(src=>{

const img=document.createElement("img");
img.src=src;
img.loading="lazy";

box.appendChild(img);

});

}

/* =======================
   RESERVATION ENGINE
======================= */

function timeToMinutes(t){

const [h,m]=t.split(":").map(Number);
return h*60+m;

}

function minutesToTime(m){

const h=String(Math.floor(m/60)).padStart(2,"0");
const min=String(m%60).padStart(2,"0");

return `${h}:${min}`;

}

function getDiningDuration(g){

if(g<=2) return 90;
if(g<=4) return 120;
if(g<=6) return 150;
if(g<=8) return 180;

return 180;

}

function isTimeOverlap(a1,a2,b1,b2){

const A1=timeToMinutes(a1);
const A2=timeToMinutes(a2);

const B1=timeToMinutes(b1);
const B2=timeToMinutes(b2);

return A1<B2 && A2>B1;

}

function isTableAvailable(tableId,start,end,date){

for(const r of reservations){

if(r.date!==date) continue;

if(!r.tables.includes(tableId)) continue;

if(isTimeOverlap(
start,end,r.startTime,r.endTime
)) return false;

}

return true;

}

function getAvailableTables(start,end,date){

return tables.filter(t=>

isTableAvailable(
t.id,start,end,date
)

);

}

/* =======================
   TABLE COMBO ENGINE
======================= */

function findTableCombination(tables,guests){

const results=[];

function search(combo,i){

const cap=
combo.reduce((s,t)=>s+t.capacity,0);

if(cap>=guests){

results.push(combo);
return;

}

for(let x=i;x<tables.length;x++){

search([...combo,tables[x]],x+1);

}

}

search([],0);

return results;

}

function findBestCombination(combos,guests){

let best=null;
let bestScore=Infinity;

combos.forEach(c=>{

const cap=
c.reduce((s,t)=>s+t.capacity,0);

const waste=cap-guests;

const score=waste*10+c.length;

if(score<bestScore){

bestScore=score;
best=c;

}

});

return best;

}

/* =======================
   SLOT ENGINE
======================= */

function generateTimeSlots(open,close,interval){

const slots=[];

let cur=timeToMinutes(open);
const end=timeToMinutes(close);

while(cur<end){

slots.push(minutesToTime(cur));
cur+=interval;

}

return slots;

}

function getSlotStatus({slot,guests}){

const date=
document.getElementById("resDate")?.value;

if(!date) return "AVAILABLE";

const dur=getDiningDuration(guests);

const end=
minutesToTime(
timeToMinutes(slot)+dur
);

const available=
getAvailableTables(slot,end,date);

const combos=
findTableCombination(available,guests);

if(combos.length===0) return "FULL";
if(combos.length<=2) return "LIMITED";

return "AVAILABLE";

}

/* =======================
   RENDER SLOTS
======================= */

function loadSlots(){

const guests=
Number(
document.getElementById("resGuests")?.value
);

if(!guests) return;

const grid=
document.getElementById("slotGrid");

if(!grid) return;

grid.innerHTML="";

const slots=
generateTimeSlots("17:00","23:00",30);

slots.forEach(slot=>{

const status=
getSlotStatus({slot,guests});

const btn=document.createElement("button");

btn.className=
"slot-btn "+status.toLowerCase();

btn.innerText=slot;

if(status==="FULL")
btn.disabled=true;

btn.onclick=()=>{

selectedSlot=slot;

document
.querySelectorAll(".slot-btn")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

highlightAvailableTables();

};

grid.appendChild(btn);

});

}

/* =======================
   TABLE MAP
======================= */

function renderTableMap(){

const map=document.getElementById("tableMap");

map.innerHTML="";

tables.forEach(t=>{

const div=document.createElement("div");

div.className="table-box";

div.dataset.id=t.id;

div.innerText=
`${t.id}\n${t.capacity}p`;

map.appendChild(div);

});

}

/* =======================
   CREATE RESERVATION
======================= */

function createReservation({
date,startTime,guests,name,phone
}){

const dur=getDiningDuration(guests);

const endTime=
minutesToTime(
timeToMinutes(startTime)+dur
);

const available=
getAvailableTables(
startTime,endTime,date
);

const combos=
findTableCombination(
available,guests
);

if(!combos.length){

return{
success:false
};

}

const best=
findBestCombination(combos,guests);

const reservation={

id:"RSV-"+Date.now(),

date,

startTime,
endTime,

duration:dur,

guests,

tables:
best.map(t=>t.id),

name,
phone,

status:"CONFIRMED",

createdAt:Date.now()

};

return{
success:true,
reservation
};

}

/* =======================
   SUBMIT
======================= */

async function submitReservation(){

const date=
document.getElementById("resDate").value;

const guests=
Number(
document.getElementById("resGuests").value
);

const name=
document.getElementById("resName").value;

const phone=
document.getElementById("resPhone").value;

if(!selectedSlot){

alert("Select time slot");
return;

}

const result=
createReservation({
date,
startTime:selectedSlot,
guests,
name,
phone
});

if(!result.success){

alert("No table available");
return;

}

await MENUVA_DB.add(
"reservations",
result.reservation
);

reservations.push(
result.reservation
);

alert("Reservation Confirmed");

closeReservationPanel();

}

/* =======================
   PANEL
======================= */

async function openReservationPanel(){

await loadReservationData();

document
.getElementById("reservationPanel")
.style.display="flex";

loadSlots();
renderTableMap();

}

function closeReservationPanel(){

document
.getElementById("reservationPanel")
.style.display="none";

selectedSlot=null;
selectedTables=[];

}

/* =======================
   LOAD DATA
======================= */

async function loadReservationData(){

tables =
await MENUVA_DB.getAll("restaurantTables") || [];

reservations =
await MENUVA_DB.getAll("reservations") || [];

}
 

 function highlightAvailableTables(){

if(!selectedSlot) return;

const guests = Number(
document.getElementById("resGuests").value
);

const date =
document.getElementById("resDate").value;

const dur = getDiningDuration(guests);

const end =
minutesToTime(
timeToMinutes(selectedSlot)+dur
);

const available =
getAvailableTables(
selectedSlot,
end,
date
);

document.querySelectorAll(".table-box")
.forEach(box=>{

const id = box.dataset.id;

box.classList.remove(
"table-available",
"table-full"
);

if(available.find(t=>t.id==id)){

box.classList.add("table-available");

}else{

box.classList.add("table-full");

}

});

}

/* =======================
   INIT
======================= */

document.addEventListener("DOMContentLoaded",async()=>{

await MENUVA_DB.openDB();

const restoId=await getRestoId();

const data=
await loadMenuPageData(restoId);

if(!data){

return;

}

renderHeader(data.resto);

renderPromo(data.promo);

renderFlipbookGallery(
"flipbookRuanganGallery",
data.flipbookRuangan,
"ruanganWarning"
);

renderFlipbookGallery(
"flipbookMenuGallery",
data.flipbookMenu,
"menuWarning"
);

const guestInput=
document.getElementById("resGuests");

if(guestInput)
guestInput.addEventListener(
"change",loadSlots
);

});

/* =======================
   UTIL
======================= */

function showFallbackUI(msg){

document
.querySelector(".container-section")
.innerHTML=
`<div style="text-align:center;padding:40px">${msg}</div>`;

}

async function goToPage(page){

const stored=
await MENUVA_DB.get(
"session",
"activeResto"
);

const id=stored?.value;

location.href =
id
? `${page}?resto=${id}`
: page;

}
